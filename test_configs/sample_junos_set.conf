## Sample Juniper MX config — set format
## Tests all sanitisation rules

# System identity
set system host-name MX-CORE-LON-01
set system domain-name corp.internal
set system domain-search search.corp.internal
set system root-authentication encrypted-password "$6$abc123$hashedpassword"
set system login announcement "Authorised users only. All access is monitored."
set system login message "WARNING: Unauthorised access is prohibited."

# Login users
set system login user admin uid 2000
set system login user admin class super-user
set system login user admin authentication encrypted-password "$6$xyz456$anotherhashedpassword"
set system login user admin authentication ssh-rsa "AAAAB3NzaC1yc2EAAAADAQABAAABgQC..."
set system login user netops uid 2001
set system login user netops class operator
set system login user netops authentication encrypted-password "$6$pqr789$yetanotherpassword"

# NTP
set system ntp authentication-key 10 type md5 value "ntpSecretKey1"
set system ntp authentication-key 20 type sha1 value "ntpSecretKey2"
set system ntp trusted-key 10
set system ntp trusted-key 20
set system ntp server 10.0.0.1 version 4 key 10

# SNMP
set snmp name MX-CORE-LON-01
set snmp location "London Core DC - Row 4 Rack 12"
set snmp contact "noc@acmecorp.com"
set snmp community public-ro authorization read-only
set snmp community mgmt-rw authorization read-write
set snmp trap-group CORE-TRAPS version v2
set snmp trap-group CORE-TRAPS targets 10.1.1.100
set snmp v3 usm local-engine user snmpv3user authentication-sha authentication-password "snmpAuthPassword"
set snmp v3 usm local-engine user snmpv3user privacy-3des privacy-password "snmpPrivPassword"

# AAA / RADIUS / TACACS+
set access radius-server 10.2.0.10 port 1812 secret "radiusSecretKey1"
set access radius-server 10.2.0.11 port 1812 secret "radiusSecretKey2"
set access tacplus-server 10.2.0.20 port 49 secret "tacacsSecretKey1"
set access profile CORP-ACCESS-PROFILE authentication-order radius
set access profile CORP-ACCESS-PROFILE radius authentication-server 10.2.0.10
set access profile CORP-ACCESS-PROFILE radius authentication-server 10.2.0.11

# Interfaces (IPs anonymised, structure preserved)
set interfaces xe-0/0/0 description "Uplink to SPINE-01"
set interfaces xe-0/0/0 unit 0 family inet address 10.100.0.1/30
set interfaces xe-0/0/0 unit 0 family inet6 address 2001:db8:100:1::1/64
set interfaces xe-0/0/1 description "Peering with AS65002"
set interfaces xe-0/0/1 unit 0 family inet address 192.168.1.1/30
set interfaces xe-0/0/2 description "Customer ACME loopback link"
set interfaces lo0 unit 0 family inet address 10.0.0.1/32
set interfaces lo0 unit 0 family inet6 address 2001:db8:1::1/128
set interfaces lo0 unit 100 family inet address 10.0.1.1/32

# Firewall filters
set firewall family inet filter MGMT-ACCESS term ALLOW-SSH from source-address 10.2.0.0/24
set firewall family inet filter MGMT-ACCESS term ALLOW-SSH from protocol tcp
set firewall family inet filter MGMT-ACCESS term ALLOW-SSH from destination-port ssh
set firewall family inet filter MGMT-ACCESS term ALLOW-SSH then accept
set firewall family inet filter MGMT-ACCESS term DEFAULT then discard
set firewall family inet filter BGP-PROTECT term ALLOW-BGP from source-address 10.100.0.2/32
set firewall family inet filter BGP-PROTECT term ALLOW-BGP then accept
set firewall family inet6 filter MGMT-ACCESS-V6 term ALLOW-SSH from source-address 2001:db8:100::/48
set firewall family inet6 filter MGMT-ACCESS-V6 term ALLOW-SSH then accept

# Apply filters to interfaces
set interfaces xe-0/0/0 unit 0 family inet filter input MGMT-ACCESS
set interfaces lo0 unit 0 family inet filter input BGP-PROTECT

# Prefix lists
set policy-options prefix-list MGMT-PREFIXES 10.2.0.0/24
set policy-options prefix-list MGMT-PREFIXES 10.3.0.0/24
set policy-options prefix-list CUSTOMER-ACME-NETS 172.16.0.0/16
set policy-options prefix-list LOOPBACKS 10.0.0.0/24

# Routing policy communities
set policy-options community CUSTOMER-ACME-COMMUNITY members target:65001:1000
set policy-options community UPSTREAM-COMMUNITY members target:65001:2000
set policy-options community NO-EXPORT members no-export

# Policy statements
set policy-options policy-statement EXPORT-TO-ACME term MATCH-ACME from protocol bgp
set policy-options policy-statement EXPORT-TO-ACME term MATCH-ACME from community CUSTOMER-ACME-COMMUNITY
set policy-options policy-statement EXPORT-TO-ACME term MATCH-ACME then accept
set policy-options policy-statement EXPORT-TO-ACME term DEFAULT then reject
set policy-options policy-statement IMPORT-FROM-UPSTREAM term FILTER-BOGONS from prefix-list MGMT-PREFIXES
set policy-options policy-statement IMPORT-FROM-UPSTREAM term FILTER-BOGONS then reject
set policy-options policy-statement IMPORT-FROM-UPSTREAM term DEFAULT then accept
set policy-options policy-statement LOOPBACK-REDISTRIB term LOOPBACKS from protocol direct
set policy-options policy-statement LOOPBACK-REDISTRIB term LOOPBACKS from prefix-list LOOPBACKS
set policy-options policy-statement LOOPBACK-REDISTRIB term LOOPBACKS then accept

# Routing options
set routing-options autonomous-system 65001
set routing-options confederation 65000
set routing-options confederation peers [65002 65003]
set routing-options router-id 10.0.0.1
set routing-options static route 0.0.0.0/0 next-hop 10.100.0.2

# BGP
set protocols bgp group UPSTREAM-PEERS type external
set protocols bgp group UPSTREAM-PEERS description "Transit providers"
set protocols bgp group UPSTREAM-PEERS export LOOPBACK-REDISTRIB
set protocols bgp group UPSTREAM-PEERS import IMPORT-FROM-UPSTREAM
set protocols bgp group UPSTREAM-PEERS peer-as 65100
set protocols bgp group UPSTREAM-PEERS neighbor 10.100.0.2 description "Transit provider A"
set protocols bgp group UPSTREAM-PEERS neighbor 10.100.0.2 authentication-key "bgpSecretKey1"
set protocols bgp group UPSTREAM-PEERS neighbor 2001:db8:100:1::2 description "Transit provider A IPv6"
set protocols bgp group UPSTREAM-PEERS neighbor 2001:db8:100:1::2 authentication-key "bgpSecretKey2"

set protocols bgp group CUSTOMER-ACME type external
set protocols bgp group CUSTOMER-ACME description "Customer ACME peering"
set protocols bgp group CUSTOMER-ACME local-as 65001
set protocols bgp group CUSTOMER-ACME peer-as 65002
set protocols bgp group CUSTOMER-ACME export EXPORT-TO-ACME
set protocols bgp group CUSTOMER-ACME neighbor 192.168.1.2 description "ACME primary peer"
set protocols bgp group CUSTOMER-ACME neighbor 192.168.1.2 authentication-key "bgpAcmeKey"

# OSPF
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 key "ospfMd5Key1"
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 start-time "2024-1-1.00:00:00"

# IS-IS
set protocols isis interface xe-0/0/0.0 level 2 authentication-key "isisAuthKey1"
set protocols isis interface xe-0/0/0.0 level 2 authentication-type md5
set protocols isis authentication-key "isisGlobalKey"
set protocols isis authentication-type md5

# Routing instances (VRF equivalent)
set routing-instances CUSTOMER-ACME-VRF instance-type vrf
set routing-instances CUSTOMER-ACME-VRF description "VRF for customer ACME"
set routing-instances CUSTOMER-ACME-VRF interface xe-0/0/2.0
set routing-instances CUSTOMER-ACME-VRF route-distinguisher 65001:100
set routing-instances CUSTOMER-ACME-VRF vrf-target target:65001:100
set routing-instances CUSTOMER-ACME-VRF protocols bgp group ACME-CE type external
set routing-instances CUSTOMER-ACME-VRF protocols bgp group ACME-CE peer-as 65200
set routing-instances CUSTOMER-ACME-VRF protocols bgp group ACME-CE neighbor 10.200.0.2

set routing-instances MGMT-VRF instance-type virtual-router
set routing-instances MGMT-VRF description "Management plane VRF"
set routing-instances MGMT-VRF interface lo0.100

# IKE / IPsec (SRX-style)
set security ike proposal IKE-PROPOSAL-AES256 authentication-method pre-shared-keys
set security ike proposal IKE-PROPOSAL-AES256 dh-group group14
set security ike proposal IKE-PROPOSAL-AES256 encryption-algorithm aes-256-cbc
set security ike policy IKE-POLICY-SITE-A mode main
set security ike policy IKE-POLICY-SITE-A proposals IKE-PROPOSAL-AES256
set security ike policy IKE-POLICY-SITE-A pre-shared-key ascii-text "ikePreSharedSecretKey"
set security ike gateway IKE-GW-SITE-A address 203.0.113.10
set security ike gateway IKE-GW-SITE-A local-identity inet 198.51.100.1
set security ike gateway IKE-GW-SITE-A ike-policy IKE-POLICY-SITE-A
set security ipsec proposal IPSEC-PROPOSAL-AES256 protocol esp
set security ipsec proposal IPSEC-PROPOSAL-AES256 encryption-algorithm aes-256-gcm
set security ipsec policy IPSEC-POLICY-SITE-A proposals IPSEC-PROPOSAL-AES256
set security ipsec vpn VPN-SITE-A bind-interface st0.0
set security ipsec vpn VPN-SITE-A ike gateway IKE-GW-SITE-A
set security ipsec vpn VPN-SITE-A ike ipsec-policy IPSEC-POLICY-SITE-A

# Security zones (SRX)
set security zones security-zone UNTRUST host-inbound-traffic system-services ike
set security zones security-zone UNTRUST interfaces xe-0/0/1.0
set security zones security-zone TRUST host-inbound-traffic system-services bgp
set security zones security-zone TRUST interfaces xe-0/0/0.0
set security zones security-zone MGMT-ZONE host-inbound-traffic system-services ssh
set security zones security-zone MGMT-ZONE interfaces lo0.0

# Security policies referencing zones
set security policies from-zone UNTRUST to-zone TRUST policy ALLOW-ESTABLISHED then permit
set security policies from-zone TRUST to-zone UNTRUST policy ALLOW-OUTBOUND then permit
set security address-book CUSTOMER-ACME-BOOK address ACME-NET-1 10.200.0.0/24

# NAT
set security nat source rule-set TRUST-TO-UNTRUST from zone TRUST
set security nat source rule-set TRUST-TO-UNTRUST to zone UNTRUST
set security nat source rule-set TRUST-TO-UNTRUST rule NAT-ALL match source-address 0.0.0.0/0
set security nat source rule-set TRUST-TO-UNTRUST rule NAT-ALL then source-nat interface

# Class of Service
set class-of-service forwarding-classes class NETWORK-CONTROL queue-num 7
set class-of-service forwarding-classes class EXPEDITED-FORWARDING queue-num 5
set class-of-service schedulers SCHED-NC transmit-rate percent 5
set class-of-service schedulers SCHED-EF transmit-rate percent 30
set class-of-service classifiers dscp DSCP-CLASSIFIER forwarding-class EXPEDITED-FORWARDING
set class-of-service scheduler-maps SCHED-MAP-CORE forwarding-class NETWORK-CONTROL scheduler SCHED-NC
set class-of-service scheduler-maps SCHED-MAP-CORE forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF
set class-of-service interfaces xe-0/0/0 scheduler-map SCHED-MAP-CORE
