## Sample Juniper EX/QFX config — curly-brace (hierarchical) format
## Tests block-format sanitisation rules

system {
    host-name EX-DIST-LON-01;
    domain-name corp.internal;
    root-authentication {
        encrypted-password "$6$blockformat$roothashedpassword";
    }
    login {
        announcement "Authorised personnel only. Activity is monitored.";
        message "This system is restricted. Disconnect immediately if unauthorised.";
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$adminblock$adminhashed";
                ssh-rsa "AAAAB3NzaC1yc2EAAAADAQAB...sshkeydata==";
            }
        }
        user readonly {
            uid 2001;
            class read-only;
            authentication {
                encrypted-password "$6$readonly$readonlyhashed";
            }
        }
    }
    ntp {
        authentication-key 1 {
            type md5;
            value "ntpBlockSecret1";
        }
        authentication-key 2 {
            type sha1;
            value "ntpBlockSecret2";
        }
        trusted-key [1 2];
        server 10.0.10.1;
    }
}

snmp {
    location "London Distribution - Floor 2";
    contact "noc-team@corp.internal";
    community READ-ONLY {
        authorization read-only;
        clients {
            10.2.0.0/24;
        }
    }
    community READ-WRITE {
        authorization read-write;
    }
    trap-group NETWORK-OPS {
        version v2;
        targets {
            10.1.2.100;
            10.1.2.101;
        }
    }
    v3 {
        usm {
            local-engine {
                user v3admin {
                    authentication-sha {
                        authentication-password "snmpV3BlockAuthPw";
                    }
                    privacy-3des {
                        privacy-password "snmpV3BlockPrivPw";
                    }
                }
            }
        }
    }
}

access {
    radius-server 10.2.1.10 {
        port 1812;
        secret "blockRadiusSecret";
    }
    radius-server 10.2.1.11 {
        port 1812;
        secret "blockRadiusSecret2";
    }
    tacplus-server 10.2.1.20 {
        port 49;
        secret "blockTacacsSecret";
    }
    profile NETWORK-ACCESS {
        authentication-order radius;
        radius {
            authentication-server [10.2.1.10 10.2.1.11];
        }
    }
}

interfaces {
    xe-0/0/0 {
        description "Uplink to CORE-ROUTER-01";
        unit 0 {
            family inet {
                address 10.110.0.2/30;
                filter {
                    input UPLINK-FILTER;
                }
            }
            family inet6 {
                address 2001:db8:110:1::2/64;
            }
        }
    }
    xe-0/0/1 {
        description "Downlink to ACCESS-SW-01";
        unit 0 {
            family inet {
                address 10.110.1.1/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.0.1.2/32;
                filter {
                    input LOOPBACK-PROTECT;
                }
            }
            family inet6 {
                address 2001:db8:1::2/128;
            }
        }
    }
}

firewall {
    family inet {
        filter UPLINK-FILTER {
            term ALLOW-BGP {
                from {
                    source-address {
                        10.110.0.1/32;
                    }
                    protocol tcp;
                    destination-port bgp;
                }
                then accept;
            }
            term DEFAULT {
                then {
                    discard;
                }
            }
        }
        filter LOOPBACK-PROTECT {
            term ALLOW-MGMT {
                from {
                    source-address {
                        10.2.0.0/24;
                        10.3.0.0/24;
                    }
                    protocol [tcp udp];
                }
                then accept;
            }
            term DEFAULT {
                then discard;
            }
        }
    }
}

policy-options {
    prefix-list MGMT-HOSTS {
        10.2.0.0/24;
        10.3.0.0/24;
    }
    prefix-list CORE-LOOPBACKS {
        10.0.0.0/24;
        10.0.1.0/24;
    }
    community INTERNAL-ROUTES {
        members target:65001:9999;
    }
    community CUSTOMER-ROUTES {
        members target:65001:1000;
    }
    community ORIGIN-ROUTES {
        members origin:65001:500;
    }
    policy-statement ADVERTISE-LOOPBACKS {
        term LOOPBACKS {
            from {
                protocol direct;
                prefix-list CORE-LOOPBACKS;
            }
            then {
                community add INTERNAL-ROUTES;
                accept;
            }
        }
        term DEFAULT {
            then reject;
        }
    }
    policy-statement RECEIVE-FROM-CORE {
        term FILTER-BOGONS {
            from {
                prefix-list MGMT-HOSTS;
            }
            then reject;
        }
        term DEFAULT {
            then accept;
        }
    }
}

routing-options {
    autonomous-system 65001;
    confederation 65000 {
        peers [65002 65003];
    }
    router-id 10.0.1.2;
    static {
        route 0.0.0.0/0 next-hop 10.110.0.1;
    }
}

protocols {
    bgp {
        group CORE-IBGP {
            description "iBGP to core routers";
            type internal;
            local-as 65001;
            export ADVERTISE-LOOPBACKS;
            import RECEIVE-FROM-CORE;
            neighbor 10.0.0.1 {
                description "MX-CORE-LON-01 iBGP";
                authentication-key "ibgpAuthKeyBlock";
            }
            neighbor 2001:db8:1::1 {
                description "MX-CORE-LON-01 iBGP IPv6";
                authentication-key "ibgpAuthKeyBlockV6";
            }
        }
    }
    ospf {
        area 0.0.0.0 {
            interface xe-0/0/0.0 {
                authentication {
                    md5 1 {
                        key "ospfBlockMd5Key";
                        start-time "2024-1-1.00:00:00";
                    }
                }
            }
            interface lo0.0 {
                passive;
            }
        }
    }
    isis {
        interface xe-0/0/0.0 {
            level 2 {
                authentication-key "isisBlockKey";
                authentication-type md5;
            }
        }
    }
    lldp {
        interface all;
    }
}

security {
    ike {
        proposal IKE-PROPOSAL-BLOCK {
            authentication-method pre-shared-keys;
            dh-group group14;
            encryption-algorithm aes-256-cbc;
        }
        policy IKE-POLICY-BLOCK {
            mode main;
            proposals IKE-PROPOSAL-BLOCK;
            pre-shared-key {
                ascii-text "ikeBlockPreSharedKey";
            }
        }
        gateway IKE-GW-BLOCK {
            address 203.0.113.20;
            ike-policy IKE-POLICY-BLOCK;
        }
    }
    ipsec {
        proposal IPSEC-PROPOSAL-BLOCK {
            protocol esp;
            encryption-algorithm aes-256-gcm;
        }
        policy IPSEC-POLICY-BLOCK {
            proposals IPSEC-PROPOSAL-BLOCK;
        }
        vpn VPN-BLOCK {
            bind-interface st0.1;
            ike {
                gateway IKE-GW-BLOCK;
                ipsec-policy IPSEC-POLICY-BLOCK;
            }
        }
    }
    pki {
        local-certificate BLOCK-DEVICE-CERT {
            certificate {
                MIIBxTCCAW+gAwIBAgIJAK5mI3fakedataforblockformat
            }
        }
    }
}

routing-instances {
    MGMT-VRF {
        description "Management VRF";
        instance-type virtual-router;
        interface lo0.100;
    }
    CUSTOMER-B-VRF {
        description "VRF for Customer B";
        instance-type vrf;
        interface xe-0/0/2.0;
        route-distinguisher 65001:200;
        vrf-target target:65001:200;
        protocols {
            bgp {
                group CUSTOMER-B-CE {
                    peer-as 65300;
                    neighbor 10.200.1.2 {
                        description "Customer B CE router";
                        authentication-key "custBAuthKey";
                    }
                }
            }
        }
    }
}

class-of-service {
    forwarding-classes {
        class BEST-EFFORT queue-num 0;
        class ASSURED-FORWARDING queue-num 3;
        class EXPEDITED-FORWARDING queue-num 5;
        class NETWORK-CONTROL queue-num 7;
    }
    schedulers {
        SCHED-BE {
            transmit-rate {
                remainder;
            }
        }
        SCHED-EF {
            transmit-rate percent 30;
            priority strict-high;
        }
    }
    scheduler-maps {
        SCHEDULER-MAP-DEFAULT {
            forwarding-class BEST-EFFORT scheduler SCHED-BE;
            forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF;
        }
    }
    interfaces {
        xe-0/0/0 {
            scheduler-map SCHEDULER-MAP-DEFAULT;
        }
    }
}