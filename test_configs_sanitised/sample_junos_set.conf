## Sample Juniper MX config — set format
## Tests all sanitisation rules

# System identity
set system host-name host-c170
set system domain-name dom-005b
set system domain-search dom-fe23
set system root-authentication encrypted-password <REMOVED>
set system login announcement <REMOVED>
set system login message <REMOVED>

# Login users
set system login user user-d120 uid 2000
set system login user user-d120 class super-user
set system login user user-d120 authentication encrypted-password <REMOVED>
set system login user user-d120 authentication ssh-rsa <REMOVED>
set system login user user-a689 uid 2001
set system login user user-a689 class operator
set system login user user-a689 authentication encrypted-password <REMOVED>

# NTP
set system ntp authentication-key kc-b2e0 type md5 value <REMOVED>
set system ntp authentication-key kc-190a type sha1 value <REMOVED>
set system ntp trusted-key kc-b2e0
set system ntp trusted-key kc-190a
set system ntp server IPv4-b766 version 4 key 10

# SNMP
set snmp name MX-CORE-LON-01
set snmp location <REMOVED>
set snmp contact <REMOVED>
set snmp community snmp-f7d9 authorization read-only
set snmp community snmp-497d authorization read-write
set snmp trap-group snmp-d076 version v2
set snmp trap-group snmp-d076 targets IPv4-982d
set snmp v3 usm local-engine user snmpv3user authentication-sha authentication-password <REMOVED>
set snmp v3 usm local-engine user snmpv3user privacy-3des privacy-password <REMOVED>

# AAA / RADIUS / TACACS+
set access radius-server IPv4-7d36 port 1812 secret <REMOVED>
set access radius-server IPv4-22e7 port 1812 secret <REMOVED>
set access tacplus-server IPv4-e5fc port 49 secret <REMOVED>
set access profile aaa-c6ee authentication-order radius
set access profile aaa-c6ee radius authentication-server IPv4-7d36
set access profile aaa-c6ee radius authentication-server IPv4-22e7

# Interfaces (IPs anonymised, structure preserved)
set interfaces xe-0/0/0 description desc-2006
set interfaces xe-0/0/0 unit 0 family inet address IPv4-3011/30
set interfaces xe-0/0/0 unit 0 family inet6 address IPv6-17b7/64
set interfaces xe-0/0/1 description desc-2336
set interfaces xe-0/0/1 unit 0 family inet address IPv4-d341/30
set interfaces xe-0/0/2 description desc-90b5
set interfaces lo0 unit 0 family inet address IPv4-b766/32
set interfaces lo0 unit 0 family inet6 address IPv6-0d0b/128
set interfaces lo0 unit 100 family inet address IPv4-8046/32

# Firewall filters
set firewall family inet filter ff-643a term ALLOW-SSH from source-address IPv4-3dfe/24
set firewall family inet filter ff-643a term ALLOW-SSH from protocol tcp
set firewall family inet filter ff-643a term ALLOW-SSH from destination-port ssh
set firewall family inet filter ff-643a term ALLOW-SSH then accept
set firewall family inet filter ff-643a term DEFAULT then discard
set firewall family inet filter ff-6974 term ALLOW-BGP from source-address IPv4-ac63/32
set firewall family inet filter ff-6974 term ALLOW-BGP then accept
set firewall family inet6 filter ff-8789 term ALLOW-SSH from source-address IPv6-12e1/48
set firewall family inet6 filter ff-8789 term ALLOW-SSH then accept

# Apply filters to interfaces
set interfaces xe-0/0/0 unit 0 family inet filter input ff-643a
set interfaces lo0 unit 0 family inet filter input ff-6974

# Prefix lists
set policy-options prefix-list pfx-6e7e IPv4-3dfe/24
set policy-options prefix-list pfx-6e7e IPv4-d071/24
set policy-options prefix-list pfx-8099 IPv4-a47d/16
set policy-options prefix-list pfx-edcd IPv4-3686/24

# Routing policy communities
set policy-options community cmty-b8e9 members target:AS-2b08:1000
set policy-options community cmty-2870 members target:AS-2b08:2000
set policy-options community cmty-b9bb members no-export
set policy-options community cmty-0b53 members origin:AS-2b08:500

# Policy statements
set policy-options policy-statement rpol-d768 term MATCH-ACME from protocol bgp
set policy-options policy-statement rpol-d768 term MATCH-ACME from community CUSTOMER-ACME-COMMUNITY
set policy-options policy-statement rpol-d768 term MATCH-ACME then accept
set policy-options policy-statement rpol-d768 term DEFAULT then reject
set policy-options policy-statement rpol-e49f term FILTER-BOGONS from prefix-list MGMT-PREFIXES
set policy-options policy-statement rpol-e49f term FILTER-BOGONS then reject
set policy-options policy-statement rpol-e49f term DEFAULT then accept
set policy-options policy-statement rpol-d75f term LOOPBACKS from protocol direct
set policy-options policy-statement rpol-d75f term LOOPBACKS from prefix-list LOOPBACKS
set policy-options policy-statement rpol-d75f term LOOPBACKS then accept

# Routing options
set routing-options autonomous-system AS-2b08
set routing-options confederation AS-d20b
set routing-options confederation peers [AS-65fe AS-e2b5]
set routing-options router-id IPv4-b766
set routing-options static route 0.0.0.0/0 next-hop IPv4-ac63

# BGP
set protocols bgp group bgrp-6dae type external
set protocols bgp group bgrp-6dae description desc-9a49
set protocols bgp group bgrp-6dae export rpol-d75f
set protocols bgp group bgrp-6dae import rpol-e49f
set protocols bgp group bgrp-6dae peer-as AS-8a26
set protocols bgp group bgrp-6dae neighbor IPv4-ac63 description desc-dace
set protocols bgp group bgrp-6dae neighbor IPv4-ac63 authentication-key <REMOVED>
set protocols bgp group bgrp-6dae neighbor IPv6-603e description desc-f89e
set protocols bgp group bgrp-6dae neighbor IPv6-603e authentication-key <REMOVED>

set protocols bgp group bgrp-d15e type external
set protocols bgp group bgrp-d15e description desc-09e0
set protocols bgp group bgrp-d15e local-as AS-2b08
set protocols bgp group bgrp-d15e peer-as AS-65fe
set protocols bgp group bgrp-d15e export rpol-d768
set protocols bgp group bgrp-d15e neighbor IPv4-2a23 description desc-d020
set protocols bgp group bgrp-d15e neighbor IPv4-2a23 authentication-key <REMOVED>

# OSPF
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 key <REMOVED>
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 start-time "2024-1-1.00:00:00"

# IS-IS
set protocols isis interface xe-0/0/0.0 level 2 authentication-key <REMOVED>
set protocols isis interface xe-0/0/0.0 level 2 authentication-type md5
set protocols isis authentication-key <REMOVED>
set protocols isis authentication-type md5

# Routing instances (VRF equivalent)
set routing-instances vrf-caed instance-type vrf
set routing-instances vrf-caed description desc-46de
set routing-instances vrf-caed interface xe-0/0/2.0
set routing-instances vrf-caed route-distinguisher AS-2b08:100
set routing-instances vrf-caed vrf-target target:AS-2b08:100
set routing-instances vrf-caed protocols bgp group ACME-CE type external
set routing-instances vrf-caed protocols bgp group ACME-CE peer-as 65200
set routing-instances vrf-caed protocols bgp group ACME-CE neighbor IPv4-ff28

set routing-instances vrf-c927 instance-type virtual-router
set routing-instances vrf-c927 description desc-bdaf
set routing-instances vrf-c927 interface lo0.100

# IKE / IPsec (SRX-style)
set security ike proposal ikep-0d10 authentication-method pre-shared-keys
set security ike proposal ikep-0d10 dh-group group14
set security ike proposal ikep-0d10 encryption-algorithm aes-256-cbc
set security ike policy ikepol-2ea6 mode main
set security ike policy ikepol-2ea6 proposals IKE-PROPOSAL-AES256
set security ike policy ikepol-2ea6 pre-shared-key ascii-text <REMOVED>
set security ike gateway ikegw-f2fc address IPv4-622f
set security ike gateway ikegw-f2fc local-identity inet IPv4-1daa
set security ike gateway ikegw-f2fc ike-policy IKE-POLICY-SITE-A
set security ipsec proposal isap-fa18 protocol esp
set security ipsec proposal isap-fa18 encryption-algorithm aes-256-gcm
set security ipsec policy isapol-a9b7 proposals IPSEC-PROPOSAL-AES256
set security ipsec vpn vpn-c771 bind-interface st0.0
set security ipsec vpn vpn-c771 ike gateway IKE-GW-SITE-A
set security ipsec vpn vpn-c771 ike ipsec-policy IPSEC-POLICY-SITE-A

# PKI local certificate (inline certificate data — exercises certificate-data item)
set security pki local-certificate CORP-DEVICE-CERT certificate <REMOVED>

# Security zones (SRX)
set security zones security-zone zone-274d host-inbound-traffic system-services ike
set security zones security-zone zone-274d interfaces xe-0/0/1.0
set security zones security-zone zone-9785 host-inbound-traffic system-services bgp
set security zones security-zone zone-9785 interfaces xe-0/0/0.0
set security zones security-zone zone-cb27 host-inbound-traffic system-services ssh
set security zones security-zone zone-cb27 interfaces lo0.0

# Security policies referencing zones
set security policies from-zone zone-274d to-zone zone-9785 policy ALLOW-ESTABLISHED then permit
set security policies from-zone zone-9785 to-zone zone-274d policy ALLOW-OUTBOUND then permit
set security address-book abook-f9cf address ACME-NET-1 IPv4-0ddc/24

# NAT
set security nat source rule-set nat-f398 from zone TRUST
set security nat source rule-set nat-f398 to zone UNTRUST
set security nat source rule-set nat-f398 rule NAT-ALL match source-address 0.0.0.0/0
set security nat source rule-set nat-f398 rule NAT-ALL then source-nat interface

# Class of Service
set class-of-service forwarding-classes class fwdc-705c queue-num 7
set class-of-service forwarding-classes class fwdc-2beb queue-num 5
set class-of-service schedulers sched-d01b transmit-rate percent 5
set class-of-service schedulers sched-01d8 transmit-rate percent 30
set class-of-service classifiers dscp cls-0b85 forwarding-class EXPEDITED-FORWARDING
set class-of-service scheduler-maps cospol-1fc4 forwarding-class NETWORK-CONTROL scheduler SCHED-NC
set class-of-service scheduler-maps cospol-1fc4 forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF
set class-of-service interfaces xe-0/0/0 scheduler-map cospol-1fc4