## Sample Juniper MX config — set format
## Tests all sanitisation rules

# System identity
set system host-name host-c9b6
set system domain-name dom-737f
set system domain-search dom-9905
set system root-authentication encrypted-password <REMOVED>
set system login announcement <REMOVED>
set system login message <REMOVED>

# Login users
set system login user user-d956 uid 2000
set system login user user-d956 class super-user
set system login user user-d956 authentication encrypted-password <REMOVED>
set system login user user-d956 authentication ssh-rsa <REMOVED>
set system login user user-db2a uid 2001
set system login user user-db2a class operator
set system login user user-db2a authentication encrypted-password <REMOVED>

# NTP
set system ntp authentication-key kc-5f1e type md5 value "ntpSecretKey1"
set system ntp authentication-key kc-a547 type sha1 value "ntpSecretKey2"
set system ntp trusted-key kc-5f1e
set system ntp trusted-key kc-a547
set system ntp server IPv4-93fc version 4 key 10

# SNMP
set snmp name MX-CORE-LON-01
set snmp location <REMOVED>
set snmp contact <REMOVED>
set snmp community snmp-426c authorization read-only
set snmp community snmp-8204 authorization read-write
set snmp trap-group snmp-531b version v2
set snmp trap-group snmp-531b targets IPv4-b736
set snmp v3 usm local-engine user snmpv3user authentication-sha authentication-password <REMOVED>
set snmp v3 usm local-engine user snmpv3user privacy-3des privacy-password <REMOVED>

# AAA / RADIUS / TACACS+
set access radius-server IPv4-2aa7 port 1812 secret <REMOVED>
set access radius-server IPv4-3fdf port 1812 secret <REMOVED>
set access tacplus-server IPv4-e2e3 port 49 secret <REMOVED>
set access profile aaa-aa96 authentication-order radius
set access profile aaa-aa96 radius authentication-server IPv4-2aa7
set access profile aaa-aa96 radius authentication-server IPv4-3fdf

# Interfaces (IPs anonymised, structure preserved)
set interfaces xe-0/0/0 description desc-ffe0
set interfaces xe-0/0/0 unit 0 family inet address IPv4-bea6/30
set interfaces xe-0/0/0 unit 0 family inet6 address IPv6-a798/64
set interfaces xe-0/0/1 description desc-69b7
set interfaces xe-0/0/1 unit 0 family inet address IPv4-0906/30
set interfaces xe-0/0/2 description desc-4af4
set interfaces lo0 unit 0 family inet address IPv4-93fc/32
set interfaces lo0 unit 0 family inet6 address IPv6-9ec4/128
set interfaces lo0 unit 100 family inet address IPv4-f8bb/32

# Firewall filters
set firewall family inet filter ff-c1d0 term ALLOW-SSH from source-address IPv4-3ab6/24
set firewall family inet filter ff-c1d0 term ALLOW-SSH from protocol tcp
set firewall family inet filter ff-c1d0 term ALLOW-SSH from destination-port ssh
set firewall family inet filter ff-c1d0 term ALLOW-SSH then accept
set firewall family inet filter ff-c1d0 term DEFAULT then discard
set firewall family inet filter ff-c165 term ALLOW-BGP from source-address IPv4-fc6d/32
set firewall family inet filter ff-c165 term ALLOW-BGP then accept
set firewall family inet6 filter ff-7939 term ALLOW-SSH from source-address IPv6-df70/48
set firewall family inet6 filter ff-7939 term ALLOW-SSH then accept

# Apply filters to interfaces
set interfaces xe-0/0/0 unit 0 family inet filter input ff-c1d0
set interfaces lo0 unit 0 family inet filter input ff-c165

# Prefix lists
set policy-options prefix-list pfx-db3c IPv4-3ab6/24
set policy-options prefix-list pfx-db3c IPv4-2e3c/24
set policy-options prefix-list pfx-7eb0 IPv4-7916/16
set policy-options prefix-list pfx-e8b2 IPv4-6d02/24

# Routing policy communities
set policy-options community cmty-21f5 members target:AS-d55c:1000
set policy-options community cmty-b993 members target:AS-d55c:2000
set policy-options community cmty-9482 members no-export

# Policy statements
set policy-options policy-statement rpol-99ec term MATCH-ACME from protocol bgp
set policy-options policy-statement rpol-99ec term MATCH-ACME from community CUSTOMER-ACME-COMMUNITY
set policy-options policy-statement rpol-99ec term MATCH-ACME then accept
set policy-options policy-statement rpol-99ec term DEFAULT then reject
set policy-options policy-statement rpol-fb3f term FILTER-BOGONS from prefix-list MGMT-PREFIXES
set policy-options policy-statement rpol-fb3f term FILTER-BOGONS then reject
set policy-options policy-statement rpol-fb3f term DEFAULT then accept
set policy-options policy-statement rpol-2711 term LOOPBACKS from protocol direct
set policy-options policy-statement rpol-2711 term LOOPBACKS from prefix-list LOOPBACKS
set policy-options policy-statement rpol-2711 term LOOPBACKS then accept

# Routing options
set routing-options autonomous-system AS-d55c
set routing-options confederation AS-0675
set routing-options confederation peers [AS-50cc AS-25d0]
set routing-options router-id IPv4-93fc
set routing-options static route 0.0.0.0/0 next-hop IPv4-fc6d

# BGP
set protocols bgp group bgrp-3e4c type external
set protocols bgp group bgrp-3e4c description desc-d9b5
set protocols bgp group bgrp-3e4c export rpol-2711
set protocols bgp group bgrp-3e4c import rpol-fb3f
set protocols bgp group bgrp-3e4c peer-as AS-9dbd
set protocols bgp group bgrp-3e4c neighbor IPv4-fc6d description desc-8423
set protocols bgp group bgrp-3e4c neighbor IPv4-fc6d authentication-key <REMOVED>
set protocols bgp group bgrp-3e4c neighbor IPv6-41ee description desc-ef11
set protocols bgp group bgrp-3e4c neighbor IPv6-41ee authentication-key <REMOVED>

set protocols bgp group bgrp-f301 type external
set protocols bgp group bgrp-f301 description desc-7225
set protocols bgp group bgrp-f301 local-as AS-d55c
set protocols bgp group bgrp-f301 peer-as AS-50cc
set protocols bgp group bgrp-f301 export rpol-99ec
set protocols bgp group bgrp-f301 neighbor IPv4-a24a description desc-46ea
set protocols bgp group bgrp-f301 neighbor IPv4-a24a authentication-key <REMOVED>

# OSPF
set protocols ospf area 0.0.0.0 interface lo0.0 passive
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 key <REMOVED>
set protocols ospf area 0.0.0.0 interface xe-0/0/0.0 authentication md5 1 start-time "2024-1-1.00:00:00"

# IS-IS
set protocols isis interface xe-0/0/0.0 level 2 authentication-key <REMOVED>
set protocols isis interface xe-0/0/0.0 level 2 authentication-type md5
set protocols isis authentication-key <REMOVED>
set protocols isis authentication-type md5

# Routing instances (VRF equivalent)
set routing-instances vrf-60f5 instance-type vrf
set routing-instances vrf-60f5 description desc-a07c
set routing-instances vrf-60f5 interface xe-0/0/2.0
set routing-instances vrf-60f5 route-distinguisher AS-d55c:100
set routing-instances vrf-60f5 vrf-target target:AS-d55c:100
set routing-instances vrf-60f5 protocols bgp group ACME-CE type external
set routing-instances vrf-60f5 protocols bgp group ACME-CE peer-as 65200
set routing-instances vrf-60f5 protocols bgp group ACME-CE neighbor IPv4-19ef

set routing-instances vrf-2afe instance-type virtual-router
set routing-instances vrf-2afe description desc-ec8b
set routing-instances vrf-2afe interface lo0.100

# IKE / IPsec (SRX-style)
set security ike proposal ikep-fa9b authentication-method pre-shared-keys
set security ike proposal ikep-fa9b dh-group group14
set security ike proposal ikep-fa9b encryption-algorithm aes-256-cbc
set security ike policy ikepol-03f2 mode main
set security ike policy ikepol-03f2 proposals IKE-PROPOSAL-AES256
set security ike policy ikepol-03f2 pre-shared-key ascii-text <REMOVED>
set security ike gateway ikegw-f2bc address IPv4-03af
set security ike gateway ikegw-f2bc local-identity inet IPv4-b2c2
set security ike gateway ikegw-f2bc ike-policy IKE-POLICY-SITE-A
set security ipsec proposal isap-5823 protocol esp
set security ipsec proposal isap-5823 encryption-algorithm aes-256-gcm
set security ipsec policy isapol-f5cb proposals IPSEC-PROPOSAL-AES256
set security ipsec vpn vpn-2528 bind-interface st0.0
set security ipsec vpn vpn-2528 ike gateway IKE-GW-SITE-A
set security ipsec vpn vpn-2528 ike ipsec-policy IPSEC-POLICY-SITE-A

# Security zones (SRX)
set security zones security-zone zone-62fd host-inbound-traffic system-services ike
set security zones security-zone zone-62fd interfaces xe-0/0/1.0
set security zones security-zone zone-cb37 host-inbound-traffic system-services bgp
set security zones security-zone zone-cb37 interfaces xe-0/0/0.0
set security zones security-zone zone-83f8 host-inbound-traffic system-services ssh
set security zones security-zone zone-83f8 interfaces lo0.0

# Security policies referencing zones
set security policies from-zone zone-62fd to-zone zone-cb37 policy ALLOW-ESTABLISHED then permit
set security policies from-zone zone-cb37 to-zone zone-62fd policy ALLOW-OUTBOUND then permit
set security address-book abook-9bd8 address ACME-NET-1 IPv4-185f/24

# NAT
set security nat source rule-set nat-069e from zone TRUST
set security nat source rule-set nat-069e to zone UNTRUST
set security nat source rule-set nat-069e rule NAT-ALL match source-address 0.0.0.0/0
set security nat source rule-set nat-069e rule NAT-ALL then source-nat interface

# Class of Service
set class-of-service forwarding-classes class fwdc-56fe queue-num 7
set class-of-service forwarding-classes class fwdc-d06e queue-num 5
set class-of-service schedulers sched-ed30 transmit-rate percent 5
set class-of-service schedulers sched-5c77 transmit-rate percent 30
set class-of-service classifiers dscp cls-1b16 forwarding-class EXPEDITED-FORWARDING
set class-of-service scheduler-maps cospol-6559 forwarding-class NETWORK-CONTROL scheduler SCHED-NC
set class-of-service scheduler-maps cospol-6559 forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF
set class-of-service interfaces xe-0/0/0 scheduler-map cospol-6559
