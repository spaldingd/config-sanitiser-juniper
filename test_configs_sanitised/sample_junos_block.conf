## Sample Juniper EX/QFX config — curly-brace (hierarchical) format
## Tests block-format sanitisation rules

system {
    host-name host-fa27;
    domain-name dom-005b;
    root-authentication {
        encrypted-password <REMOVED>;
    }
    login {
        announcement <REMOVED>;
        message <REMOVED>;
        user user-d120 {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password <REMOVED>;
                ssh-rsa <REMOVED>;
            }
        }
        user user-0c86 {
            uid 2001;
            class read-only;
            authentication {
                encrypted-password <REMOVED>;
            }
        }
    }
    ntp {
        authentication-key 1 {
            type md5;
            value <REMOVED>;
        }
        authentication-key 2 {
            type sha1;
            value <REMOVED>;
        }
        trusted-key [1 2];
        server IPv4-d72c;
    }
}

snmp {
    location <REMOVED>;
    contact <REMOVED>;
    community cmty-7383 {
        authorization read-only;
        clients {
            IPv4-3dfe/24;
        }
    }
    community cmty-9470 {
        authorization read-write;
    }
    trap-group NETWORK-OPS {
        version v2;
        targets {
            IPv4-540c;
            IPv4-255a;
        }
    }
    v3 {
        usm {
            local-engine {
                user user-d09a {
                    authentication-sha {
                        authentication-password <REMOVED>;
                    }
                    privacy-3des {
                        privacy-password <REMOVED>;
                    }
                }
            }
        }
    }
}

access {
    radius-server IPv4-414f {
        port 1812;
        secret <REMOVED>;
    }
    radius-server IPv4-efc5 {
        port 1812;
        secret <REMOVED>;
    }
    tacplus-server IPv4-1f08 {
        port 49;
        secret <REMOVED>;
    }
    profile NETWORK-ACCESS {
        authentication-order radius;
        radius {
            authentication-server [IPv4-414f IPv4-efc5];
        }
    }
}

interfaces {
    xe-0/0/0 {
        description desc-ee0c;
        unit 0 {
            family inet {
                address IPv4-a153/30;
                filter {
                    input UPLINK-FILTER;
                }
            }
            family inet6 {
                address IPv6-328a/64;
            }
        }
    }
    xe-0/0/1 {
        description desc-8784;
        unit 0 {
            family inet {
                address IPv4-9610/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address IPv4-6faf/32;
                filter {
                    input LOOPBACK-PROTECT;
                }
            }
            family inet6 {
                address IPv6-46f7/128;
            }
        }
    }
}

firewall {
    family inet {
        filter ff-edb8 {
            term ALLOW-BGP {
                from {
                    source-address {
                        IPv4-eeb1/32;
                    }
                    protocol tcp;
                    destination-port bgp;
                }
                then accept;
            }
            term DEFAULT {
                then {
                    discard;
                }
            }
        }
        filter ff-9898 {
            term ALLOW-MGMT {
                from {
                    source-address {
                        IPv4-3dfe/24;
                        IPv4-d071/24;
                    }
                    protocol [tcp udp];
                }
                then accept;
            }
            term DEFAULT {
                then discard;
            }
        }
    }
}

policy-options {
    prefix-list pfx-e029 {
        IPv4-3dfe/24;
        IPv4-d071/24;
    }
    prefix-list pfx-f380 {
        IPv4-3686/24;
        IPv4-7025/24;
    }
    community cmty-0b60 {
        members target:AS-2b08:9999;
    }
    community cmty-9da8 {
        members target:AS-2b08:1000;
    }
    community cmty-e7fc {
        members origin:AS-2b08:500;
    }
    policy-statement rpol-d8aa {
        term LOOPBACKS {
            from {
                protocol direct;
                prefix-list pfx-f380;
            }
            then {
                community add cmty-732d;
                accept;
            }
        }
        term DEFAULT {
            then reject;
        }
    }
    policy-statement rpol-783f {
        term FILTER-BOGONS {
            from {
                prefix-list pfx-e029;
            }
            then reject;
        }
        term DEFAULT {
            then accept;
        }
    }
}

routing-options {
    autonomous-system AS-2b08;
    confederation 65000 {
        peers [65002 65003];
    }
    router-id IPv4-6faf;
    static {
        route 0.0.0.0/0 next-hop IPv4-eeb1;
    }
}

protocols {
    bgp {
        group bgrp-12e9 {
            description desc-7650;
            type internal;
            local-as AS-2b08;
            export rpol-d8aa;
            import rpol-783f;
            neighbor IPv4-b766 {
                description desc-cf54;
                authentication-key <REMOVED>;
            }
            neighbor IPv6-0d0b {
                description desc-2b6a;
                authentication-key <REMOVED>;
            }
        }
    }
    ospf {
        area 0.0.0.0 {
            interface xe-0/0/0.0 {
                authentication {
                    md5 1 {
                        key <REMOVED>;
                        start-time "2024-1-1.00:00:00";
                    }
                }
            }
            interface lo0.0 {
                passive;
            }
        }
    }
    isis {
        interface xe-0/0/0.0 {
            level 2 {
                authentication-key <REMOVED>;
                authentication-type md5;
            }
        }
    }
    lldp {
        interface all;
    }
}

security {
    ike {
        proposal ikep-4c20 {
            authentication-method pre-shared-keys;
            dh-group group14;
            encryption-algorithm aes-256-cbc;
        }
        policy ikepol-f828 {
            mode main;
            proposals IKE-PROPOSAL-BLOCK;
            pre-shared-key {
                ascii-text <REMOVED>;
            }
        }
        gateway ikegw-6335 {
            address IPv4-ad1e;
            ike-policy IKE-POLICY-BLOCK;
        }
    }
    ipsec {
        proposal ikep-020e {
            protocol esp;
            encryption-algorithm aes-256-gcm;
        }
        policy ikepol-3dae {
            proposals IPSEC-PROPOSAL-BLOCK;
        }
        vpn vpn-b379 {
            bind-interface st0.1;
            ike {
                gateway IKE-GW-BLOCK;
                ipsec-policy IPSEC-POLICY-BLOCK;
            }
        }
    }
    pki {
        local-certificate BLOCK-DEVICE-CERT {
            certificate { <REMOVED> }
        }
    }
}

routing-instances {
    MGMT-VRF {
        description desc-18f8;
        instance-type virtual-router;
        interface lo0.100;
    }
    CUSTOMER-B-VRF {
        description desc-b30a;
        instance-type vrf;
        interface xe-0/0/2.0;
        route-distinguisher AS-2b08:200;
        vrf-target target:AS-2b08:200;
        protocols {
            bgp {
                group bgrp-fb34 {
                    peer-as AS-5083;
                    neighbor IPv4-7f82 {
                        description desc-035b;
                        authentication-key <REMOVED>;
                    }
                }
            }
        }
    }
}

class-of-service {
    forwarding-classes {
        class BEST-EFFORT queue-num 0;
        class ASSURED-FORWARDING queue-num 3;
        class EXPEDITED-FORWARDING queue-num 5;
        class NETWORK-CONTROL queue-num 7;
    }
    schedulers {
        SCHED-BE {
            transmit-rate {
                remainder;
            }
        }
        SCHED-EF {
            transmit-rate percent 30;
            priority strict-high;
        }
    }
    scheduler-maps {
        SCHEDULER-MAP-DEFAULT {
            forwarding-class BEST-EFFORT scheduler SCHED-BE;
            forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF;
        }
    }
    interfaces {
        xe-0/0/0 {
            scheduler-map SCHEDULER-MAP-DEFAULT;
        }
    }
}