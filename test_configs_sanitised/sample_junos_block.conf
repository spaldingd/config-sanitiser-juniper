## Sample Juniper EX/QFX config — curly-brace (hierarchical) format
## Tests block-format sanitisation rules

system {
    host-name host-488b;
    domain-name dom-737f;
    root-authentication {
        encrypted-password <REMOVED>;
    }
    login {
        announcement <REMOVED>;
        message <REMOVED>;
        user user-d956 {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password <REMOVED>;
                ssh-rsa <REMOVED>;
            }
        }
        user user-6ee0 {
            uid 2001;
            class read-only;
            authentication {
                encrypted-password <REMOVED>;
            }
        }
    }
    ntp {
        authentication-key 1 {
            type md5;
            value <REMOVED>;
        }
        authentication-key 2 {
            type sha1;
            value <REMOVED>;
        }
        trusted-key [1 2];
        server IPv4-883b;
    }
}

snmp {
    location <REMOVED>;
    contact <REMOVED>;
    community cmty-60de {
        authorization read-only;
        clients {
            IPv4-3ab6/24;
        }
    }
    community cmty-9741 {
        authorization read-write;
    }
    trap-group NETWORK-OPS {
        version v2;
        targets {
            IPv4-9b10;
            IPv4-17d3;
        }
    }
    v3 {
        usm {
            local-engine {
                user user-a0dd {
                    authentication-sha {
                        authentication-password <REMOVED>;
                    }
                    privacy-3des {
                        privacy-password <REMOVED>;
                    }
                }
            }
        }
    }
}

access {
    radius-server IPv4-7b96 {
        port 1812;
        secret <REMOVED>;
    }
    radius-server IPv4-c3dc {
        port 1812;
        secret <REMOVED>;
    }
    profile NETWORK-ACCESS {
        authentication-order radius;
        radius {
            authentication-server [IPv4-7b96 IPv4-c3dc];
        }
    }
}

interfaces {
    xe-0/0/0 {
        description desc-e095;
        unit 0 {
            family inet {
                address IPv4-b815/30;
                filter {
                    input UPLINK-FILTER;
                }
            }
            family inet6 {
                address IPv6-d0fa/64;
            }
        }
    }
    xe-0/0/1 {
        description desc-da8c;
        unit 0 {
            family inet {
                address IPv4-65ce/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address IPv4-594f/32;
                filter {
                    input LOOPBACK-PROTECT;
                }
            }
            family inet6 {
                address IPv6-80d3/128;
            }
        }
    }
}

firewall {
    family inet {
        filter ff-7f67 {
            term ALLOW-BGP {
                from {
                    source-address {
                        IPv4-8fa2/32;
                    }
                    protocol tcp;
                    destination-port bgp;
                }
                then accept;
            }
            term DEFAULT {
                then {
                    discard;
                }
            }
        }
        filter ff-a6ac {
            term ALLOW-MGMT {
                from {
                    source-address {
                        IPv4-3ab6/24;
                        IPv4-2e3c/24;
                    }
                    protocol [tcp udp];
                }
                then accept;
            }
            term DEFAULT {
                then discard;
            }
        }
    }
}

policy-options {
    prefix-list pfx-9936 {
        IPv4-3ab6/24;
        IPv4-2e3c/24;
    }
    prefix-list pfx-cde8 {
        IPv4-6d02/24;
        IPv4-5fc1/24;
    }
    community cmty-28ef {
        members target:AS-d55c:9999;
    }
    community cmty-565f {
        members target:AS-d55c:1000;
    }
    policy-statement rpol-f748 {
        term LOOPBACKS {
            from {
                protocol direct;
                prefix-list pfx-cde8;
            }
            then {
                community add cmty-01ac;
                accept;
            }
        }
        term DEFAULT {
            then reject;
        }
    }
    policy-statement rpol-35bc {
        term FILTER-BOGONS {
            from {
                prefix-list pfx-9936;
            }
            then reject;
        }
        term DEFAULT {
            then accept;
        }
    }
}

routing-options {
    autonomous-system AS-d55c;
    router-id IPv4-594f;
    static {
        route 0.0.0.0/0 next-hop IPv4-8fa2;
    }
}

protocols {
    bgp {
        group bgrp-49f4 {
            description desc-0308;
            type internal;
            local-as AS-d55c;
            export rpol-f748;
            import rpol-35bc;
            neighbor IPv4-93fc {
                description desc-6d82;
                authentication-key <REMOVED>;
            }
            neighbor IPv6-9ec4 {
                description desc-053d;
                authentication-key <REMOVED>;
            }
        }
    }
    ospf {
        area 0.0.0.0 {
            interface xe-0/0/0.0 {
                authentication {
                    md5 1 {
                        key <REMOVED>;
                        start-time "2024-1-1.00:00:00";
                    }
                }
            }
            interface lo0.0 {
                passive;
            }
        }
    }
    isis {
        interface xe-0/0/0.0 {
            level 2 {
                authentication-key <REMOVED>;
                authentication-type md5;
            }
        }
    }
    lldp {
        interface all;
    }
}

routing-instances {
    MGMT-VRF {
        description desc-4355;
        instance-type virtual-router;
        interface lo0.100;
    }
    CUSTOMER-B-VRF {
        description desc-f23e;
        instance-type vrf;
        interface xe-0/0/2.0;
        route-distinguisher AS-d55c:200;
        vrf-target target:AS-d55c:200;
        protocols {
            bgp {
                group bgrp-3c87 {
                    peer-as AS-fb26;
                    neighbor IPv4-bf48 {
                        description desc-da6c;
                        authentication-key <REMOVED>;
                    }
                }
            }
        }
    }
}

class-of-service {
    forwarding-classes {
        class BEST-EFFORT queue-num 0;
        class ASSURED-FORWARDING queue-num 3;
        class EXPEDITED-FORWARDING queue-num 5;
        class NETWORK-CONTROL queue-num 7;
    }
    schedulers {
        SCHED-BE {
            transmit-rate {
                remainder;
            }
        }
        SCHED-EF {
            transmit-rate percent 30;
            priority strict-high;
        }
    }
    scheduler-maps {
        SCHEDULER-MAP-DEFAULT {
            forwarding-class BEST-EFFORT scheduler SCHED-BE;
            forwarding-class EXPEDITED-FORWARDING scheduler SCHED-EF;
        }
    }
    interfaces {
        xe-0/0/0 {
            scheduler-map SCHEDULER-MAP-DEFAULT;
        }
    }
}
